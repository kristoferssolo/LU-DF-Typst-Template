name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
assignees: [kristoferssolo]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check [existing issues](../../issues) to avoid duplicates.
  - type: input
    id: typst-version
    attributes:
      label: Typst Version
      description: Run `typst --version`
      placeholder: "e.g. typst 0.14.0"
    validations:
      required: true
  - type: input
    id: template-version
    attributes:
      label: Template Version
      description: Release tag or commit hash
      placeholder: "e.g. v1.0.0 or a3f5c2d"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: >
        A minimal `.typ` snippet that reproduces the issue. Remove everything not necessary to trigger the bug.

      render: typst
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: >
        Screenshots, PDF output snippets, compiler errors, or anything else relevant.

    validations:
      required: false
